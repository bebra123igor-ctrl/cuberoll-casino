<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeRoll Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #111827;
            --card: #1a1f2e;
            --card-h: #222840;
            --elev: #252b3d;
            --accent: #6366f1;
            --accent-h: #818cf8;
            --accent-g: rgba(99, 102, 241, .3);
            --purple: #a855f7;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --t1: #f1f5f9;
            --t2: #94a3b8;
            --t3: #64748b;
            --border: rgba(255, 255, 255, .06);
            --border-a: rgba(99, 102, 241, .3);
            --r: 16px;
            --r-sm: 10px;
            --r-xs: 6px;
            --font: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, .06) 0%, transparent 50%), var(--bg);
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .hdr {
            text-align: center;
            padding: 24px 0;
        }

        .hdr h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hdr p {
            color: var(--t3);
            font-size: 14px;
            margin-top: 4px;
        }

        .auth-box {
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
        }

        .auth-msg {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 20px;
            color: var(--t2);
            font-size: 14px;
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .st {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 16px;
            transition: all .3s;
        }

        .st:hover {
            border-color: var(--border-a);
            box-shadow: 0 0 20px var(--accent-g);
        }

        .st-l {
            font-size: 12px;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .st-v {
            font-size: 24px;
            font-weight: 800;
            margin-top: 4px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .st-v.g {
            background: linear-gradient(135deg, var(--green), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .st-v.y {
            background: linear-gradient(135deg, var(--yellow), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .st-v.r {
            background: linear-gradient(135deg, var(--red), #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg2);
            border-radius: var(--r-xs);
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--t3);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--r-xs);
            transition: all .2s;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        .tab:hover:not(.active) {
            color: var(--t1);
        }

        .pnl {
            display: none;
        }

        .pnl.active {
            display: block;
            animation: fi .3s ease;
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .sgrp {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .si {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            padding: 12px 16px;
        }

        .si-l {
            font-size: 14px;
            font-weight: 500;
        }

        .si-i {
            width: 120px;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            color: var(--t1);
            font-family: var(--font);
            font-size: 14px;
            text-align: right;
            outline: none;
        }

        .si-i:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--r-xs);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-p {
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: #fff;
        }

        .btn-p:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-g);
        }

        .btn-d {
            background: var(--red);
            color: #fff;
        }

        .btn-s {
            background: var(--green);
            color: #fff;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .tbl {
            width: 100%;
            overflow-x: auto;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            margin-bottom: 6px;
            font-size: 13px;
            transition: all .2s;
        }

        .row:hover {
            background: var(--card-h);
        }

        .row .cid {
            width: 100px;
            color: var(--t3);
            font-family: monospace;
            font-size: 12px;
        }

        .row .cname {
            flex: 1;
            font-weight: 600;
        }

        .row .cbal {
            width: 100px;
            text-align: right;
            font-weight: 700;
            color: var(--yellow);
        }

        .row .cgames {
            width: 70px;
            text-align: center;
        }

        .row .cact {
            display: flex;
            gap: 4px;
        }

        .cst {
            width: 60px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-ok {
            background: rgba(16, 185, 129, .15);
            color: var(--green);
        }

        .badge-ban {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        .grow {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            margin-bottom: 4px;
            font-size: 12px;
        }

        .grow .gu {
            width: 100px;
            font-weight: 600;
        }

        .grow .gt {
            width: 80px;
        }

        .grow .gd {
            width: 60px;
            text-align: center;
        }

        .grow .gb {
            width: 80px;
            text-align: right;
        }

        .grow .gr {
            width: 80px;
            text-align: right;
            font-weight: 700;
        }

        .grow .gr.w {
            color: var(--green);
        }

        .grow .gr.l {
            color: var(--red);
        }

        .grow .gtime {
            flex: 1;
            text-align: right;
            color: var(--t3);
            font-size: 11px;
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-bg.show {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 24px;
            width: 90%;
            max-width: 360px;
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-in {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            color: var(--t1);
            font-family: var(--font);
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }

        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .hidden {
            display: none;
        }

        .maint {
            background: rgba(239, 68, 68, .1);
            border: 1px solid var(--red);
            border-radius: var(--r-xs);
            padding: 10px 16px;
            font-size: 14px;
            color: var(--red);
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }

        .maint.show {
            display: block;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .rbtn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-xs);
            color: var(--t1);
            padding: 8px 14px;
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            transition: all .2s;
        }

        .rbtn:hover {
            background: var(--card-h);
            border-color: var(--border-a);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="hdr">
            <h1>👑 CubeRoll Admin</h1>
            <p>Панель управления</p>
        </div>

        <div id="auth-box" class="auth-box">
            <div class="auth-msg">🔐 Откройте через Telegram или войдите как админ.<br><br>В дев режиме авторизация не
                нужна.</div>
        </div>

        <div id="content" class="hidden">
            <div id="maint-bar" class="maint">🔧 Обслуживание ВКЛ — игры приостановлены</div>
            <div class="topbar"><button class="rbtn" onclick="loadAll()">🔄 Обновить</button></div>

            <div class="stats" id="stats">
                <div class="st">
                    <div class="st-l">Юзеры</div>
                    <div class="st-v" id="s-users">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Игр</div>
                    <div class="st-v" id="s-games">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Поставлено</div>
                    <div class="st-v y" id="s-wager">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Выплачено</div>
                    <div class="st-v r" id="s-pay">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Профит</div>
                    <div class="st-v g" id="s-profit">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Сегодня</div>
                    <div class="st-v" id="s-today">0</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-p="users">👥 Игроки</button>
                <button class="tab" data-p="games">🎮 Игры</button>
                <button class="tab" data-p="settings">⚙️ Настройки</button>
            </div>

            <div class="pnl active" id="p-users">
                <div class="tbl" id="tbl-users"></div>
            </div>
            <div class="pnl" id="p-games">
                <div class="tbl" id="tbl-games"></div>
            </div>
            <div class="pnl" id="p-settings">
                <div class="sgrp" id="sgrp"></div><br>
                <button class="btn btn-p" onclick="saveSets()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="bal-modal">
        <div class="modal">
            <h3>💰 Баланс</h3>
            <p style="font-size:13px;color:var(--t3);margin-bottom:12px">Юзер: <strong id="m-name">-</strong></p>
            <input type="number" class="modal-in" id="m-bal" placeholder="Новый баланс">
            <div class="modal-btns">
                <button class="btn" style="background:var(--elev);color:var(--t1)"
                    onclick="closeModal()">Отмена</button>
                <button class="btn btn-p" id="m-save">Установить</button>
            </div>
        </div>
    </div>

    <script>
        let tg = null, initData = '';
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand(); tg.ready();
            try { tg.setHeaderColor('#0a0e17'); tg.setBackgroundColor('#0a0e17'); } catch (e) { }
            initData = tg.initData;
        }

        async function api(url, method = 'GET', body = null) {
            const h = { 'Content-Type': 'application/json' };
            if (initData) h['X-Telegram-Init-Data'] = initData;
            else h['X-Dev-User-Id'] = '12345';
            const o = { method, headers: h };
            if (body) o.body = JSON.stringify(body);
            const r = await fetch(url, o);
            if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'err ' + r.status); }
            return r.json();
        }

        // табы
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.pnl').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                document.getElementById('p-' + t.dataset.p).classList.add('active');
            });
        });

        async function loadAll() {
            try {
                await api('/api/auth', 'POST');
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                await Promise.all([loadStats(), loadUsers(), loadGames(), loadSets()]);
            } catch (e) {
                if (e.message === 'Access denied') {
                    document.querySelector('.auth-msg').innerHTML = '🚫 <b>Нет доступа.</b>';
                } else {
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    await Promise.all([loadStats(), loadUsers(), loadGames(), loadSets()]).catch(console.error);
                }
            }
        }

        async function loadStats() {
            try {
                const d = await api('/api/admin/stats');
                document.getElementById('s-users').textContent = d.userCount || 0;
                document.getElementById('s-games').textContent = d.overall?.total_games || 0;
                document.getElementById('s-wager').textContent = (d.overall?.total_wagered || 0).toFixed(0);
                document.getElementById('s-pay').textContent = (d.overall?.total_payouts || 0).toFixed(0);
                document.getElementById('s-profit').textContent = (-(d.overall?.total_profit || 0)).toFixed(0);
                document.getElementById('s-today').textContent = d.today?.total_games || 0;
                const bar = document.getElementById('maint-bar');
                d.settings?.maintenance_mode === '1' ? bar.classList.add('show') : bar.classList.remove('show');
            } catch (e) { console.error(e); }
        }

        async function loadUsers() {
            try {
                const d = await api('/api/admin/users');
                const t = document.getElementById('tbl-users');
                if (!d.users?.length) { t.innerHTML = '<p style="text-align:center;color:var(--t3);padding:20px">Нет юзеров</p>'; return; }
                t.innerHTML = d.users.map(u => `
          <div class="row">
            <div class="cid">${u.telegram_id}</div>
            <div class="cname">${u.username ? '@' + u.username : (u.first_name || '—')}</div>
            <div class="cbal">💰 ${u.balance.toFixed(0)}</div>
            <div class="cgames">${u.games_played} 🎮</div>
            <div class="cst"><span class="badge ${u.is_banned ? 'badge-ban' : 'badge-ok'}">${u.is_banned ? 'BAN' : 'OK'}</span></div>
            <div class="cact">
              <button class="btn btn-sm btn-p" onclick="openModal(${u.telegram_id},'${(u.username || u.first_name || '—').replace(/'/g, "\\'")}',${u.balance})">💰</button>
              <button class="btn btn-sm ${u.is_banned ? 'btn-s' : 'btn-d'}" onclick="${u.is_banned ? `unban(${u.telegram_id})` : `ban(${u.telegram_id})`}">${u.is_banned ? '✅' : '🚫'}</button>
            </div>
          </div>
        `).join('');
            } catch (e) { console.error(e); }
        }

        async function loadGames() {
            try {
                const d = await api('/api/admin/games');
                const t = document.getElementById('tbl-games');
                if (!d.games?.length) { t.innerHTML = '<p style="text-align:center;color:var(--t3);padding:20px">Нет игр</p>'; return; }
                t.innerHTML = d.games.map(g => {
                    const w = g.won === 1;
                    const tm = new Date(g.created_at).toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
                    return `<div class="grow">
            <div class="gu">${g.username ? '@' + g.username : (g.first_name || g.telegram_id)}</div>
            <div class="gt">${g.player_choice}</div>
            <div class="gd">${g.dice_result} (${g.dice_total})</div>
            <div class="gb">${g.bet_amount.toFixed(0)}</div>
            <div class="gr ${w ? 'w' : 'l'}">${w ? '+' + g.payout.toFixed(0) : '-' + g.bet_amount.toFixed(0)}</div>
            <div class="gtime">${tm}</div>
          </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function loadSets() {
            try {
                const d = await api('/api/admin/stats');
                const g = document.getElementById('sgrp');
                const s = d.settings || {};
                const names = { min_bet: 'Мин. ставка', max_bet: 'Макс. ставка', starting_balance: 'Старт баланс', house_edge: 'Хаус эдж (%)', maintenance_mode: 'Обслуживание (0/1)' };
                g.innerHTML = Object.entries(s).map(([k, v]) => `
          <div class="si"><span class="si-l">${names[k] || k}</span><input type="text" class="si-i" data-k="${k}" value="${v}"></div>
        `).join('');
            } catch (e) { console.error(e); }
        }

        async function saveSets() {
            for (const inp of document.querySelectorAll('.si-i[data-k]')) {
                try { await api('/api/admin/settings', 'POST', { key: inp.dataset.k, value: inp.value }); } catch (e) { console.error(e); }
            }
            alert('Сохранено ✅');
            loadAll();
        }

        let mUid = null;
        function openModal(id, name, bal) {
            mUid = id;
            document.getElementById('m-name').textContent = name;
            document.getElementById('m-bal').value = bal;
            document.getElementById('bal-modal').classList.add('show');
        }
        function closeModal() { document.getElementById('bal-modal').classList.remove('show'); mUid = null; }

        document.getElementById('m-save').addEventListener('click', async () => {
            if (!mUid) return;
            const b = parseFloat(document.getElementById('m-bal').value);
            if (isNaN(b)) return;
            try { await api(`/api/admin/user/${mUid}/balance`, 'POST', { balance: b }); closeModal(); loadUsers(); loadStats(); }
            catch (e) { alert(e.message); }
        });

        async function ban(id) { if (!confirm('Забанить?')) return; try { await api(`/api/admin/user/${id}/ban`, 'POST'); loadUsers(); } catch (e) { alert(e.message); } }
        async function unban(id) { try { await api(`/api/admin/user/${id}/unban`, 'POST'); loadUsers(); } catch (e) { alert(e.message); } }

        document.getElementById('bal-modal').addEventListener('click', e => { if (e.target.id === 'bal-modal') closeModal(); });
        loadAll();
    </script>
</body>

</html>
