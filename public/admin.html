<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeRoll — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #121212;
            --bg2: #1a1a1a;
            --card: #1e1e1e;
            --card2: #242424;
            --card-h: #2a2a2a;
            --surface: #2f2f2f;
            --gold: #0088cc;
            --gold2: #00aaff;
            --gold-g: rgba(0, 136, 204, .2);
            --green: #5cb85c;
            --red: #d9534f;
            --accent: #0088cc;
            --t1: #f5f5f5;
            --t2: #a0a0a0;
            --t3: #666;
            --t4: #444;
            --border: rgba(255, 255, 255, .05);
            --border2: rgba(255, 255, 255, .08);
            --r: 12px;
            --r-sm: 8px;
            --font: 'Inter', sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 16px;
        }

        .hdr {
            text-align: center;
            padding: 20px 0 16px;
        }

        .hdr h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: -.5px;
        }

        .hdr p {
            color: var(--t4);
            font-size: 12px;
            margin-top: 2px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        .auth-box {
            max-width: 380px;
            margin: 32px auto;
            text-align: center;
        }

        .auth-msg {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 18px;
            color: var(--t3);
            font-size: 13px;
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            margin-bottom: 18px;
        }

        .st {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 14px;
            transition: all .2s;
        }

        .st:hover {
            border-color: var(--border2);
        }

        .st-l {
            font-size: 10px;
            color: var(--t4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .st-v {
            font-size: 22px;
            font-weight: 800;
            margin-top: 4px;
            color: var(--t1);
            letter-spacing: -.5px;
        }

        .st-v.g {
            color: var(--green);
        }

        .st-v.y {
            color: var(--gold);
        }

        .st-v.r {
            color: var(--red);
        }

        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 14px;
            background: var(--bg2);
            border-radius: 6px;
            padding: 3px;
        }

        .tab {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            color: var(--t4);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 5px;
            transition: all .15s;
        }

        .tab.active {
            background: var(--card2);
            color: var(--t1);
        }

        .tab:hover:not(.active) {
            color: var(--t2);
        }

        .pnl {
            display: none;
        }

        .pnl.active {
            display: block;
            animation: fi .25s ease;
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .sgrp {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .si {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
        }

        .si-l {
            font-size: 13px;
            font-weight: 500;
            color: var(--t2);
        }

        .si-i {
            width: 110px;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--t1);
            font-family: var(--font);
            font-size: 13px;
            text-align: right;
            outline: none;
        }

        .si-i:focus {
            border-color: var(--border2);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-p {
            background: var(--t1);
            color: var(--bg);
        }

        .btn-p:hover {
            background: #fff;
        }

        .btn-d {
            background: rgba(217, 83, 79, .15);
            color: var(--red);
            border: 1px solid rgba(217, 83, 79, .2);
        }

        .btn-s {
            background: rgba(92, 184, 92, .15);
            color: var(--green);
            border: 1px solid rgba(92, 184, 92, .2);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 11px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 12px;
            transition: background .15s;
        }

        .row:hover {
            background: var(--card-h);
        }

        .row .cid {
            width: 90px;
            color: var(--t4);
            font-family: monospace;
            font-size: 11px;
        }

        .row .cname {
            flex: 1;
            font-weight: 600;
        }

        .row .cbal {
            width: 90px;
            text-align: right;
            font-weight: 700;
            color: var(--gold);
        }

        .row .cgames {
            width: 60px;
            text-align: center;
            color: var(--t3);
        }

        .row .cact {
            display: flex;
            gap: 4px;
        }

        .cst {
            width: 50px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-ok {
            background: rgba(92, 184, 92, .1);
            color: var(--green);
        }

        .badge-ban {
            background: rgba(217, 83, 79, .1);
            color: var(--red);
        }

        .grow {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 3px;
            font-size: 11px;
        }

        .grow .gu {
            width: 90px;
            font-weight: 600;
        }

        .grow .gt {
            width: 70px;
            color: var(--t3);
        }

        .grow .gd {
            width: 55px;
            text-align: center;
        }

        .grow .gb {
            width: 70px;
            text-align: right;
            color: var(--t3);
        }

        .grow .gr {
            width: 70px;
            text-align: right;
            font-weight: 700;
        }

        .grow .gr.w {
            color: var(--green);
        }

        .grow .gr.l {
            color: var(--red);
        }

        .grow .gtime {
            flex: 1;
            text-align: right;
            color: var(--t4);
            font-size: 10px;
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-bg.show {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 22px;
            width: 88%;
            max-width: 340px;
        }

        .modal h3 {
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 700;
        }

        .modal-in {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--t1);
            font-family: var(--font);
            font-size: 15px;
            outline: none;
            margin-bottom: 14px;
        }

        .modal-btns {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .hidden {
            display: none;
        }

        .maint {
            background: rgba(217, 83, 79, .08);
            border: 1px solid rgba(217, 83, 79, .2);
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 12px;
            color: var(--red);
            text-align: center;
            margin-bottom: 14px;
            display: none;
        }

        .maint.show {
            display: block;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .rbtn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--t2);
            padding: 7px 12px;
            font-size: 12px;
            font-family: var(--font);
            cursor: pointer;
            transition: all .15s;
        }

        .rbtn:hover {
            background: var(--card-h);
            color: var(--t1);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="hdr">
            <h1>👑 CubeRoll Admin</h1>
            <p>Панель управления</p>
        </div>

        <div id="auth-box" class="auth-box">
            <div class="auth-msg">🔐 Откройте через Telegram бота или войдите как админ.<br><br>В дев режиме авторизация
                не нужна.</div>
        </div>

        <div id="content" class="hidden">
            <div id="maint-bar" class="maint">🔧 Обслуживание ВКЛ</div>
            <div class="topbar"><button class="rbtn" onclick="loadAll()">🔄 Обновить</button></div>

            <div class="stats">
                <div class="st">
                    <div class="st-l">Юзеры</div>
                    <div class="st-v" id="s-users">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Всего игр</div>
                    <div class="st-v" id="s-games">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Поставлено</div>
                    <div class="st-v y" id="s-wager">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Выплачено</div>
                    <div class="st-v r" id="s-pay">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Профит</div>
                    <div class="st-v g" id="s-profit">0</div>
                </div>
                <div class="st">
                    <div class="st-l">Сегодня</div>
                    <div class="st-v" id="s-today">0</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-p="users">👥 Игроки</button>
                <button class="tab" data-p="games">🎮 Игры</button>
                <button class="tab" data-p="gifts">🎁 Подарки</button>
                <button class="tab" data-p="settings">⚙️ Настройки</button>
            </div>

            <div class="pnl active" id="p-users">
                <div id="tbl-users"></div>
            </div>
            <div class="pnl" id="p-games">
                <div id="tbl-games"></div>
            </div>
            <div class="pnl" id="p-gifts">
                <div class="si" style="margin-bottom:12px;display:block">
                    <h3 style="font-size:14px;margin-bottom:10px">Добавить подарок</h3>
                    <div style="display:flex;flex-direction:column;gap:8px">
                        <input type="text" id="gift-link" class="si-i" style="width:100%;text-align:left"
                            placeholder="Ссылка на подарок">
                        <button class="btn btn-p" onclick="parseLink()">Спарсить инфо</button>
                        <div id="gift-preview-box"
                            style="display:none;padding:10px;background:var(--bg2);border-radius:6px;gap:10px;align-items:center;margin-top:8px">
                            <div id="gift-parsed-icon" style="width:50px;height:50px;background:#333;border-radius:6px">
                            </div>
                            <div style="flex:1">
                                <input type="text" id="gift-title" class="si-i"
                                    style="width:100%;text-align:left;margin-bottom:4px" placeholder="Название">
                                <input type="number" id="gift-price" class="si-i" style="width:100%;text-align:left"
                                    placeholder="Цена (TON)">
                            </div>
                        </div>
                        <button id="btn-save-gift" class="btn btn-s" style="display:none;margin-top:8px"
                            onclick="saveGift()">Сохранить</button>
                    </div>
                </div>
                <div id="tbl-gifts"></div>
            </div>
            <div class="pnl" id="p-settings">
                <div class="sgrp" id="sgrp"></div>
                <br>
                <button class="btn btn-p" onclick="saveSets()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="bal-modal">
        <div class="modal">
            <h3>💰 Установить баланс</h3>
            <p style="font-size:12px;color:var(--t3);margin-bottom:10px">Юзер: <strong id="m-name">—</strong></p>
            <input type="number" class="modal-in" id="m-bal" placeholder="Новый баланс">
            <div class="modal-btns">
                <button class="btn" style="background:var(--surface);color:var(--t2)"
                    onclick="closeModal()">Отмена</button>
                <button class="btn btn-p" id="m-save">Установить</button>
            </div>
        </div>
    </div>

    <script>
        let tg = null, initData = '';
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp; tg.expand(); tg.ready();
            try { tg.setHeaderColor('#121212'); tg.setBackgroundColor('#121212'); } catch (e) { }
            initData = tg.initData;
        }

        async function api(url, method = 'GET', body = null) {
            const h = { 'Content-Type': 'application/json' };
            if (initData) h['X-Telegram-Init-Data'] = initData;
            else h['X-Dev-User-Id'] = '12345';
            const o = { method, headers: h };
            if (body) o.body = JSON.stringify(body);
            const r = await fetch(url, o);
            if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'err'); }
            return r.json();
        }

        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.pnl').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                document.getElementById('p-' + t.dataset.p).classList.add('active');
            });
        });

        async function loadAll() {
            try {
                await api('/api/auth', 'POST');
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                await Promise.all([loadStats(), loadUsers(), loadGames(), loadGifts(), loadSets()]);
            } catch (e) {
                if (e.message === 'Access denied') { document.querySelector('.auth-msg').innerHTML = '🚫 <b>Нет доступа.</b>'; }
                else { document.getElementById('auth-box').classList.add('hidden'); document.getElementById('content').classList.remove('hidden'); await Promise.all([loadStats(), loadUsers(), loadGames(), loadSets()]).catch(console.error); }
            }
        }

        async function loadStats() {
            try {
                const d = await api('/api/admin/stats');
                document.getElementById('s-users').textContent = d.userCount || 0;
                document.getElementById('s-games').textContent = d.overall?.total_games || 0;
                document.getElementById('s-wager').textContent = (d.overall?.total_wagered || 0).toFixed(0);
                document.getElementById('s-pay').textContent = (d.overall?.total_payouts || 0).toFixed(0);
                document.getElementById('s-profit').textContent = (-(d.overall?.total_profit || 0)).toFixed(0);
                document.getElementById('s-today').textContent = d.today?.total_games || 0;
                const bar = document.getElementById('maint-bar');
                d.settings?.maintenance_mode === '1' ? bar.classList.add('show') : bar.classList.remove('show');
            } catch (e) { console.error(e); }
        }

        async function loadUsers() {
            try {
                const d = await api('/api/admin/users');
                const t = document.getElementById('tbl-users');
                if (!d.users?.length) { t.innerHTML = '<p style="text-align:center;color:var(--t4);padding:20px">Нет юзеров</p>'; return; }
                t.innerHTML = d.users.map(u => `<div class="row">
          <div class="cid">${u.telegram_id}</div>
          <div class="cname">${u.username ? '@' + u.username : (u.first_name || '—')}</div>
          <div class="cbal">${u.balance.toFixed(0)}</div>
          <div class="cgames">${u.games_played}</div>
          <div class="cst"><span class="badge ${u.is_banned ? 'badge-ban' : 'badge-ok'}">${u.is_banned ? 'BAN' : 'OK'}</span></div>
          <div class="cact">
            <button class="btn btn-sm btn-p" onclick="openModal(${u.telegram_id},'${(u.username || u.first_name || '—').replace(/'/g, "\\'")}',${u.balance})">💰</button>
            <button class="btn btn-sm ${u.is_banned ? 'btn-s' : 'btn-d'}" onclick="${u.is_banned ? `unban(${u.telegram_id})` : `ban(${u.telegram_id})`}">${u.is_banned ? '✅' : '🚫'}</button>
          </div>
        </div>`).join('');
            } catch (e) { console.error(e); }
        }

        async function loadGames() {
            try {
                const d = await api('/api/admin/games');
                const t = document.getElementById('tbl-games');
                if (!d.games?.length) { t.innerHTML = '<p style="text-align:center;color:var(--t4);padding:20px">Нет игр</p>'; return; }
                t.innerHTML = d.games.map(g => {
                    const w = g.won === 1;
                    const tm = new Date(g.created_at).toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
                    return `<div class="grow">
            <div class="gu">${g.username ? '@' + g.username : (g.first_name || g.telegram_id)}</div>
            <div class="gt">${g.player_choice}</div><div class="gd">${g.dice_result} (${g.dice_total})</div>
            <div class="gb">${g.bet_amount.toFixed(0)}</div>
            <div class="gr ${w ? 'w' : 'l'}">${w ? '+' + g.payout.toFixed(0) : '-' + g.bet_amount.toFixed(0)}</div>
            <div class="gtime">${tm}</div>
          </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function loadGifts() {
            try {
                const d = await api('/api/gifts');
                const t = document.getElementById('tbl-gifts');
                if (!d.gifts?.length) { t.innerHTML = '<p style="text-align:center;color:var(--t4);padding:20px">Нет подарков</p>'; return; }
                t.innerHTML = d.gifts.map(g => `<div class="row">
          <div class="cid" style="width:40px">${g.id}</div>
          <div class="cname">${g.title} — <span style="color:var(--gold)">${g.price} C</span></div>
          <div class="cact">
            <button class="btn btn-sm btn-d" onclick="deleteGift(${g.id})">🗑️</button>
          </div>
        </div>`).join('');
            } catch (e) { console.error(e); }
        }

        let parsedData = null;
        async function parseLink() {
            const url = document.getElementById('gift-link').value;
            if (!url) return alert('Введите ссылку');
            // эмуляция парсинга
            parsedData = {
                model: 'https://cdn-icons-png.flaticon.com/512/2619/2619280.png',
                background: 'radial-gradient(circle, #222, #000)',
                symbol: '💎'
            };
            document.getElementById('gift-preview-box').style.display = 'flex';
            document.getElementById('gift-parsed-icon').style.background = parsedData.background;
            document.getElementById('gift-parsed-icon').innerHTML = `<img src="${parsedData.model}" style="width:100%"><div style="position:absolute;bottom:0;right:0;font-size:10px">${parsedData.symbol}</div>`;
            document.getElementById('btn-save-gift').style.display = 'block';
        }

        async function saveGift() {
            const title = document.getElementById('gift-title').value;
            const price = document.getElementById('gift-price').value;
            const link = document.getElementById('gift-link').value;
            if (!title || !price || !parsedData) return alert('Заполните всё');
            try {
                await api('/api/admin/gifts', 'POST', {
                    title, price: parseFloat(price), link,
                    ...parsedData
                });
                alert('Сохранено');
                loadGifts();
            } catch (e) { alert(e.message); }
        }

        async function deleteGift(id) {
            if (!confirm('Удалить?')) return;
            try {
                await api('/api/admin/gifts/' + id, 'DELETE');
                loadGifts();
            } catch (e) { alert(e.message); }
        }

        async function loadSets() {
            try {
                const d = await api('/api/admin/stats');
                const g = document.getElementById('sgrp'); const s = d.settings || {};
                const n = {
                    min_bet: 'Мин. ставка',
                    max_bet: 'Макс. ставка',
                    starting_balance: 'Старт баланс',
                    house_edge: 'Хаус эдж (%)',
                    maintenance_mode: 'Обслуживание (0/1)',
                    ton_wallet: 'Кошелёк для TON (принимающий)',
                    min_deposit: 'Мин. пополнение (TON)'
                };
                g.innerHTML = Object.entries(s).map(([k, v]) => `<div class="si"><span class="si-l">${n[k] || k}</span><input type="text" class="si-i" data-k="${k}" value="${v}"></div>`).join('');
            } catch (e) { console.error(e); }
        }

        async function saveSets() {
            for (const i of document.querySelectorAll('.si-i[data-k]')) { try { await api('/api/admin/settings', 'POST', { key: i.dataset.k, value: i.value }); } catch (e) { } }
            alert('Сохранено ✅'); loadAll();
        }

        let mUid = null;
        function openModal(id, name, bal) { mUid = id; document.getElementById('m-name').textContent = name; document.getElementById('m-bal').value = bal; document.getElementById('bal-modal').classList.add('show'); }
        function closeModal() { document.getElementById('bal-modal').classList.remove('show'); mUid = null; }
        document.getElementById('m-save').addEventListener('click', async () => { if (!mUid) return; const b = parseFloat(document.getElementById('m-bal').value); if (isNaN(b)) return; try { await api(`/api/admin/user/${mUid}/balance`, 'POST', { balance: b }); closeModal(); loadUsers(); loadStats(); } catch (e) { alert(e.message); } });
        async function ban(id) { if (!confirm('Забанить?')) return; try { await api(`/api/admin/user/${id}/ban`, 'POST'); loadUsers(); } catch (e) { alert(e.message); } }
        async function unban(id) { try { await api(`/api/admin/user/${id}/unban`, 'POST'); loadUsers(); } catch (e) { alert(e.message); } }
        document.getElementById('bal-modal').addEventListener('click', e => { if (e.target.id === 'bal-modal') closeModal(); });
        loadAll();
    </script>
</body>

</html>
